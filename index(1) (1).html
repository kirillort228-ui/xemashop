<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReviewMarket — Система отзывов на товары</title>
  <meta name="description"
    content="ReviewMarket — современная платформа для отзывов на товары с профилями пользователей">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    /* ===== RESET ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Gradient Theme — Light */
      --bg-page: #0b0e2a;
      --bg-gradient: linear-gradient(135deg, #0b0e2a 0%, #1a1050 25%, #2d1b69 40%, #4a2c8a 55%, #2563a8 70%, #1a8aab 85%, #38bdf8 100%);
      --bg-card: rgba(255, 255, 255, 0.08);
      --bg-card-hover: rgba(255, 255, 255, 0.13);
      --bg-card-solid: rgba(255, 255, 255, 0.1);
      --bg-input: rgba(255, 255, 255, 0.07);
      --bg-nav: rgba(11, 14, 42, 0.65);
      --text-primary: #f5f5f7;
      --text-secondary: rgba(245, 245, 247, 0.7);
      --text-tertiary: rgba(245, 245, 247, 0.4);
      --link-color: #64d2ff;
      --link-hover: #5ac8fa;
      --border-color: rgba(255, 255, 255, 0.1);
      --border-separator: rgba(255, 255, 255, 0.12);
      --star-color: #ffcc00;
      --star-empty: rgba(255, 255, 255, 0.18);
      --danger: #ff453a;
      --success: #30d158;
      --blue-accent: #64d2ff;
      --blue-accent-hover: #5ac8fa;
      --blue-light: rgba(100, 210, 255, 0.12);
      --shadow-card: 0 4px 30px rgba(0, 0, 0, 0.2);
      --shadow-modal: 0 24px 80px rgba(0, 0, 0, 0.5);
      --modal-overlay: rgba(0, 0, 0, 0.55);
      --radius: 14px;
      --radius-lg: 20px;
      --radius-xl: 24px;
      --radius-pill: 980px;
      --transition: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
      --nav-border: rgba(255, 255, 255, 0.08);
      --badge-bg: rgba(255, 255, 255, 0.1);
      --glass-blur: blur(40px) saturate(180%);
    }

    [data-theme="dark"] {
      --bg-page: #020515;
      --bg-gradient: linear-gradient(135deg, #020515 0%, #0d0a30 25%, #1a0e4a 40%, #2e1570 55%, #1a3a80 70%, #0f5e78 85%, #1a7a9e 100%);
      --bg-card: rgba(255, 255, 255, 0.05);
      --bg-card-hover: rgba(255, 255, 255, 0.09);
      --bg-card-solid: rgba(255, 255, 255, 0.06);
      --bg-input: rgba(255, 255, 255, 0.05);
      --bg-nav: rgba(2, 5, 21, 0.7);
      --text-primary: #e8e8ec;
      --text-secondary: rgba(232, 232, 236, 0.6);
      --text-tertiary: rgba(232, 232, 236, 0.3);
      --link-color: #5ac8fa;
      --link-hover: #64d2ff;
      --border-color: rgba(255, 255, 255, 0.06);
      --border-separator: rgba(255, 255, 255, 0.08);
      --star-empty: rgba(255, 255, 255, 0.12);
      --blue-accent: #5ac8fa;
      --blue-accent-hover: #64d2ff;
      --blue-light: rgba(90, 200, 250, 0.1);
      --shadow-card: 0 4px 30px rgba(0, 0, 0, 0.3);
      --shadow-modal: 0 24px 80px rgba(0, 0, 0, 0.7);
      --modal-overlay: rgba(0, 0, 0, 0.7);
      --nav-border: rgba(255, 255, 255, 0.05);
      --badge-bg: rgba(255, 255, 255, 0.07);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-primary);
      line-height: 1.47059;
      letter-spacing: -0.022em;
      transition: color var(--transition);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    /* ===== NAVIGATION BAR (Apple-style) ===== */
    .header {
      background: var(--bg-nav);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 9999;
      border-bottom: 1px solid var(--nav-border);
      padding: 0 22px;
    }

    .header-inner {
      width: 100%;
      max-width: 1024px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-primary);
      transition: opacity var(--transition);
    }

    .logo:hover {
      opacity: 0.7;
    }

    .logo-icon {
      font-size: 1.15rem;
      color: var(--text-primary);
      opacity: 0.85;
    }

    .logo-text {
      font-size: 0.93rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }

    .header-center {
      flex: 1;
      max-width: 320px;
      margin: 0 1.5rem;
    }

    .search-box {
      position: relative;
      width: 100%;
    }

    .search-box input {
      width: 100%;
      padding: 7px 12px 7px 32px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-pill);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.82rem;
      outline: none;
      transition: all var(--transition);
      backdrop-filter: blur(10px);
    }

    .search-box input::placeholder {
      color: var(--text-tertiary);
    }

    .search-box input:focus {
      background: rgba(255, 255, 255, 0.14);
      border-color: var(--blue-accent);
      box-shadow: 0 0 0 4px var(--blue-light);
    }

    .search-box .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      font-size: 0.72rem;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .profile-link {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px 8px 14px;
      border-radius: var(--radius-pill);
      background: linear-gradient(135deg, #2563a8, #38bdf8);
      border: none;
      color: #fff;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 600;
      transition: all 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
      white-space: nowrap;
      box-shadow: 0 2px 16px rgba(56, 189, 248, 0.3);
      letter-spacing: -0.01em;
      position: relative;
      overflow: hidden;
    }

    .profile-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent 60%);
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .profile-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 24px rgba(56, 189, 248, 0.45);
    }

    .profile-link:hover::before {
      opacity: 1;
    }

    .profile-link:active {
      transform: scale(0.97);
    }

    .profile-link i {
      font-size: 0.8rem;
    }

    .profile-link .profile-name {
      letter-spacing: -0.01em;
    }


    .market-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-pill);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .market-tab {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 8px 14px;
      border: none;
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.76rem;
      font-weight: 650;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      letter-spacing: -0.01em;
    }

    .market-tab:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.08);
    }

    .market-tab.active {
      color: #fff;
      background: linear-gradient(135deg, #2563a8, #38bdf8);
      box-shadow: 0 2px 16px rgba(56, 189, 248, 0.28);
    }

    .market-tab i {
      font-size: 0.78rem;
    }

    /* ===== THEME TOGGLE (Apple-style) ===== */
    .theme-toggle {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      transition: all var(--transition);
      color: var(--text-primary);
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .theme-toggle:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.1);
    }

    /* ===== MAIN LAYOUT ===== */
    .main-container {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      max-width: 1280px;
      margin: 0 auto;
      min-height: calc(100vh - 48px);
    }

    /* ===== LEFT PANEL ===== */
    .products-panel {
      padding: 28px 20px;
      border-right: 1px solid var(--border-color);
      overflow-y: auto;
      max-height: calc(100vh - 52px);
      position: sticky;
      top: 52px;
      background: rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .panel-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 16px;
    }

    .products-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ===== PRODUCT CARD (Glassmorphic) ===== */
    .product-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px;
      background: transparent;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
      border: 1px solid transparent;
      position: relative;
    }

    .product-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .product-card.active {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(100, 210, 255, 0.3);
      box-shadow: 0 0 20px rgba(100, 210, 255, 0.08);
    }

    .product-image-wrapper {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      overflow: hidden;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.06);
    }

    .product-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .product-card:hover .product-image {
      transform: scale(1.05);
    }

    .product-info {
      flex: 1;
      min-width: 0;
    }

    .product-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-price {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .product-rating {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .product-rating .stars {
      display: flex;
      gap: 1px;
    }

    .product-rating .stars i {
      color: var(--star-color);
      font-size: 0.6rem;
    }

    .product-rating .stars i.empty {
      color: var(--star-empty);
    }

    .product-rating .rating-text {
      color: var(--text-tertiary);
      font-size: 0.72rem;
    }

    /* ===== RIGHT PANEL ===== */
    .detail-panel {
      padding: 0;
      overflow-y: auto;
      max-height: calc(100vh - 52px);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 500px;
      text-align: center;
      color: var(--text-tertiary);
      gap: 12px;
      padding: 40px;
    }

    .empty-state i {
      font-size: 2.5rem;
      opacity: 0.2;
    }

    .empty-state h3 {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .empty-state p {
      font-size: 0.88rem;
      color: var(--text-secondary);
      max-width: 280px;
      line-height: 1.5;
    }

    /* ===== PRODUCT DETAIL (Apple-style hero) ===== */
    .product-detail {
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .detail-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 56px 40px 40px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-bottom: 1px solid var(--border-color);
    }

    .detail-image {
      width: 220px;
      height: 220px;
      border-radius: var(--radius-xl);
      object-fit: cover;
      margin-bottom: 28px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .detail-info {
      max-width: 500px;
    }

    .detail-info h2 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .detail-info .price {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .detail-rating {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .detail-rating .big-score {
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .detail-rating-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }

    .detail-rating .stars {
      display: flex;
      gap: 2px;
    }

    .detail-rating .stars i {
      color: var(--star-color);
      font-size: 0.85rem;
    }

    .detail-rating .stars i.empty {
      color: var(--star-empty);
    }

    .detail-rating .review-count {
      font-size: 0.75rem;
      color: var(--text-tertiary);
    }

    .detail-description {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-top: 16px;
      max-width: 460px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ===== REVIEWS SECTION ===== */
    .reviews-section {
      padding: 0;
    }

    .reviews-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 40px 16px;
    }

    .reviews-header h3 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .reviews-header h3 i {
      display: none;
    }

    .sort-select {
      padding: 6px 12px;
      border: 1px solid var(--border-separator);
      border-radius: var(--radius-pill);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.76rem;
      cursor: pointer;
      outline: none;
      transition: all var(--transition);
    }

    .sort-select:focus {
      border-color: var(--blue-accent);
    }

    .reviews-list {
      max-height: 520px;
      overflow-y: auto;
      padding: 0 40px;
    }

    /* ===== REVIEW CARD ===== */
    .review-card {
      padding: 20px 0;
      border-top: 1px solid var(--border-color);
      position: relative;
    }

    .review-card:first-child {
      border-top: none;
    }

    .review-card.new-review {
      animation: reviewAppear 0.5s ease;
    }

    @keyframes reviewAppear {
      0% {
        opacity: 0;
        transform: translateY(-12px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes reviewRemove {
      to {
        opacity: 0;
        transform: translateX(30px);
        height: 0;
        padding: 0;
        margin: 0;
        overflow: hidden;
      }
    }

    .review-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .review-user {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    .review-user:hover {
      opacity: 0.65;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .avatar.large {
      width: 72px;
      height: 72px;
      font-size: 1.4rem;
    }

    .review-user-info h4 {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .review-user-info .review-date {
      font-size: 0.72rem;
      color: var(--text-tertiary);
    }

    .review-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .review-stars {
      display: flex;
      gap: 2px;
    }

    .review-stars i {
      color: var(--star-color);
      font-size: 0.68rem;
    }

    .review-stars i.empty {
      color: var(--star-empty);
    }

    .delete-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      font-size: 0.72rem;
    }

    .delete-btn:hover {
      background: rgba(255, 59, 48, 0.1);
      color: var(--danger);
    }

    .review-text {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.58;
    }

    /* ===== REVIEW FORM ===== */
    .review-form-container {
      padding: 28px 40px 40px;
      border-top: 1px solid var(--border-color);
      margin-top: 8px;
    }

    .review-form-container h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .review-form-container h3 i {
      display: none;
    }


    .reviews-source-note p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border-separator);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.88rem;
      outline: none;
      transition: all var(--transition);
      resize: vertical;
      backdrop-filter: blur(10px);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--blue-accent);
      box-shadow: 0 0 0 4px var(--blue-light);
    }

    .form-group textarea {
      min-height: 88px;
    }

    .star-rating-input {
      display: flex;
      gap: 4px;
      cursor: pointer;
    }

    .star-rating-input i {
      font-size: 1.3rem;
      color: var(--star-empty);
      transition: all 0.15s ease;
      cursor: pointer;
    }

    .star-rating-input i:hover,
    .star-rating-input i.active {
      color: var(--star-color);
      transform: scale(1.12);
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: var(--radius-pill);
      background: linear-gradient(135deg, #2563a8, #64d2ff);
      color: #fff;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;

    function getPlayerokMergeKey(product) {
      const name = product.name.toLowerCase();
      if (name.includes('forza horizon')) return 'forza_horizon_6_premium_1_day';
      if (name.includes('th 16') && name.includes('строитель')) return 'clash_th16_5_builders';
      if (name.includes('far cry 4')) return 'far_cry_4';
      if (name.includes('fc 25')) return 'fc_25_steam_7_days';
      if (name.includes('15000 очков')) return '15000_points';
      if (name.includes('detroit')) return 'detroit_become_human';
      if (name.includes('20000 очков')) return '20000_points';
      if (name.includes('6000 очков')) return '6000_points';
      if (name.includes('appstore') && name.includes('itunes') && name.includes('3 usd')) return 'appstore_itunes_3_usd';
      if (name.includes('discord nitro basic')) return 'discord_nitro_basic_30_days';
      if (name.includes('appstore') && name.includes('itunes') && name.includes('15 usd')) return 'appstore_itunes_15_usd';
      if (name.includes('itunes') && name.includes('5 usd')) return 'itunes_5_usd';
      return name.replace(/[^a-zа-яё0-9]+/gi, ' ').trim();
    }

    function parseRubPrice(price) {
      const value = String(price || '').replace(/[^0-9]/g, '');
      return value ? parseInt(value, 10) : 0;
    }

    function formatRubPrice(value) {
      return String(value).replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' ₽';
    }

    function collapseDuplicatePlayerokProducts(items) {
      const grouped = new Map();
      items.forEach(product => {
        const key = getPlayerokMergeKey(product);
        if (!grouped.has(key)) {
          grouped.set(key, { ...product, saleCount: 0, salePrices: [], saleLinks: [], buyers: [], sourceIds: [] });
        }
        const current = grouped.get(key);
        current.saleCount += 1;
        current.salePrices.push(parseRubPrice(product.price));
        current.saleLinks.push(product.link);
        current.sourceIds.push(product.id);
        const buyerMatch = String(product.description || '').match(/Покупатель: ([^.]+)\./);
        if (buyerMatch) current.buyers.push(buyerMatch[1]);
      });

      return Array.from(grouped.values()).map(product => {
        const prices = product.salePrices.filter(Boolean);
        const min = prices.length ? Math.min(...prices) : 0;
        const max = prices.length ? Math.max(...prices) : 0;
        const priceText = min && max && min !== max ? `${formatRubPrice(min)} — ${formatRubPrice(max)}` : product.price;
        const countText = `${product.saleCount} ${pluralize(product.saleCount, 'продажа', 'продажи', 'продаж')}`;
        return {
          ...product,
          price: priceText,
          description: `Проданный товар Playerok. Объединено одинаковых продаж: ${product.saleCount}. ${min && max ? `Диапазон цен: ${priceText}. ` : ''}Карточка собрана из подтверждённых продаж профиля xema.`,
          uniqueLabel: countText,
          link: product.saleLinks[0]
        };
      });
    }

    function getMarketplacePlaylist(product) {
      const name = String(product.name || '').toLowerCase();
      const market = product.marketplace || activeMarketplace;

      if (market === 'starvell') {
        if (name.includes('discord') || name.includes('nitro')) return { key: 'starvell_discord', title: 'Discord Nitro', icon: 'fa-brands fa-discord', subtitle: 'Подписки и бусты Discord' };
        if (name.includes('youtube')) return { key: 'starvell_youtube', title: 'YouTube Premium', icon: 'fa-brands fa-youtube', subtitle: 'Premium-подписки и доступ' };
        if (name.includes('steam') || name.includes('terraria') || name.includes('mortal kombat') || name.includes('игра')) return { key: 'starvell_steam_games', title: 'Steam и игры', icon: 'fa-brands fa-steam', subtitle: 'Игры, гифт-карты и ключи' };
        if (name.includes('apple') || name.includes('itunes')) return { key: 'starvell_apple', title: 'Apple / iTunes', icon: 'fa-brands fa-apple', subtitle: 'Подарочные карты Apple' };
        if (name.includes('roblox')) return { key: 'starvell_roblox', title: 'Roblox', icon: 'fa-solid fa-cube', subtitle: 'Аккаунты и игровые товары' };
        if (name.includes('clash')) return { key: 'starvell_clash', title: 'Clash of Clans', icon: 'fa-solid fa-shield-halved', subtitle: 'Аккаунты и прогресс' };
        return { key: 'starvell_other', title: 'Другие товары STARVELL', icon: 'fa-solid fa-layer-group', subtitle: 'Прочие цифровые товары' };
      }

      if (name.includes('forza') || name.includes('far cry') || name.includes('detroit') || name.includes('fc 25')) return { key: 'playerok_steam_games', title: 'Игры и аренда Steam', icon: 'fa-brands fa-steam', subtitle: 'Проданные игровые товары' };
      if (name.includes('th 16') || name.includes('clash')) return { key: 'playerok_clash_accounts', title: 'Аккаунты Clash of Clans', icon: 'fa-solid fa-shield-halved', subtitle: 'Аккаунты и прогресс' };
      if (name.includes('discord')) return { key: 'playerok_discord', title: 'Discord Nitro', icon: 'fa-brands fa-discord', subtitle: 'Nitro и цифровые услуги' };
      if (name.includes('appstore') || name.includes('itunes') || name.includes('apple')) return { key: 'playerok_apple_cards', title: 'App Store / iTunes', icon: 'fa-brands fa-apple', subtitle: 'Подарочные карты Apple' };
      if (name.includes('очков')) return { key: 'playerok_game_points', title: 'Игровая валюта и очки', icon: 'fa-solid fa-coins', subtitle: 'Очки и внутриигровая валюта' };
      return { key: 'playerok_other', title: 'Другие товары Playerok', icon: 'fa-solid fa-layer-group', subtitle: 'Остальные подтверждённые продажи' };
    }

    function groupMarketplacePlaylists(items) {
      const groups = new Map();
      items.forEach(product => {
        const playlist = getMarketplacePlaylist(product);
        if (!groups.has(playlist.key)) groups.set(playlist.key, { ...playlist, items: [] });
        groups.get(playlist.key).items.push(product);
      });
      return Array.from(groups.values()).sort((a, b) => a.title.localeCompare(b.title, 'ru'));
    }

    function getPlaylistStats(items) {
      const reviewCount = items.reduce((sum, item) => sum + getReviewCount(item), 0);
      const ratingItems = items.map(item => getAverageRating(item)).filter(Boolean);
      const avg = ratingItems.length ? ratingItems.reduce((sum, value) => sum + value, 0) / ratingItems.length : 0;
      const soldCount = items.filter(item => item.sold).length;
      return { reviewCount, avg, soldCount };
    }

      return reviews.filter(r => ids.has(r.productId));

    function getAverageRating(productOrId) {

    function formatDate(ds) {
      const d = new Date(ds);
      const m = ['янв', 'фев', 'мар', 'апр', 'май', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];
      return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;
    }

    function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }
    function randomColor() { return AVATAR_COLORS[Math.floor(Math.random() * AVATAR_COLORS.length)]; }

    function pluralize(n, one, few, many) {
      const m10 = n % 10, m100 = n % 100;
      if (m10 === 1 && m100 !== 11) return one;
      if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
      return many;
    }

    /* ============================================================
       RENDER PRODUCTS
       ============================================================ */
    function renderProductCard(p) {
      const avg = getAverageRating(p);
      const count = getReviewCount(p);
      const active = selectedProductId === p.id;
      return `
      <div class="product-card ${active ? 'active' : ''}" onclick="selectProduct('${p.id}')" id="product-${p.id}">
        <div class="product-image-wrapper">
          <img src="${p.image}" alt="${p.name}" class="product-image" loading="lazy" onerror="this.style.display='none'">
        </div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-price">${p.price}</div>
          ${p.uniqueLabel ? `<div class="product-price" style="font-size:0.72rem;color:var(--blue-accent);margin-bottom:4px">${p.uniqueLabel}</div>` : ''}
          <div class="product-rating">
            <div class="stars">${getStarsHTML(Math.round(avg))}</div>
            <span class="rating-text">${avg.toFixed(1)} (${count})</span>
          </div>
        </div>
      </div>`;
    }

    function renderProducts(filter = '') {
      const grid = document.getElementById('productsGrid');
      const filtered = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
      const groups = groupMarketplacePlaylists(filtered);
      grid.innerHTML = groups.map(group => {
        const stats = getPlaylistStats(group.items);
        return `
          <div class="playlist-section premium-playlist" id="playlist-${group.key}">
            <div class="playlist-header premium-playlist-header" onclick="togglePlaylist('${group.key}')">
              <div class="playlist-main">
                <div class="playlist-icon"><i class="${group.icon}"></i></div>
                <div class="playlist-copy">
                  <div class="playlist-title"><span>${group.title}</span></div>
                  <div class="playlist-subtitle">${group.subtitle || 'Подборка похожих товаров'}</div>
                </div>
              </div>
              <div class="playlist-stats">
                <span><i class="fas fa-star"></i> ${stats.avg ? stats.avg.toFixed(1) : '5.0'}</span>
                <span><i class="fas fa-comment-dots"></i> ${stats.reviewCount}</span>
                <span><i class="fas fa-box"></i> ${group.items.length}</span>
                ${stats.soldCount ? `<span><i class="fas fa-lock"></i> ${stats.soldCount}</span>` : ''}
                <i class="fas fa-chevron-down playlist-chevron"></i>
              </div>
            </div>
            <div class="playlist-products">
              ${group.items.map(renderProductCard).join('')}
            </div>
          </div>
        `;
      }).join('') || `<div class="no-reviews"><i class="fas fa-magnifying-glass"></i><p>Ничего не найдено.</p></div>`;
    }

    /* ============================================================
       SELECT PRODUCT
       ============================================================ */
    function selectProduct(pid) {
      selectedProductId = pid;
      renderProducts(document.getElementById('searchInput').value);
      renderDetail();
    }

    function renderDetailPlaylist(product) {
      const playlist = getMarketplacePlaylist(product);
      const similar = products.filter(p => getMarketplacePlaylist(p).key === playlist.key);
      if (similar.length <= 1) return '';
      return `
        <div class="detail-playlist">
          <strong>Плейлист: ${playlist.title}</strong><br>
          Похожие товары объединены в одну подборку.
          <div class="detail-playlist-items">
            ${similar.map(item => `<button class="detail-playlist-chip ${item.id === product.id ? 'active' : ''}" onclick="selectProduct('${item.id}')">${item.name.replace(/^[🔥💎🩵\s]+/, '').slice(0, 34)}${item.name.length > 34 ? '…' : ''}</button>`).join('')}
          </div>
        </div>`;
    }

    /* ============================================================
       RENDER DETAIL
       ============================================================ */
    function renderDetail() {
      const panel = document.getElementById('detailPanel');
      if (!selectedProductId) {
        panel.innerHTML = '';
        panel.appendChild(createEmptyState());
        return;
      }
      const product = products.find(p => p.id === selectedProductId);
      if (!product) return;
      const avg = getAverageRating(product);
      const count = getReviewCount(product);

      panel.innerHTML = `
    <div class="product-detail">
      <div class="detail-hero">
        <img src="${product.image}" alt="${product.name}" class="detail-image" loading="lazy" onerror="this.style.display='none'">
        <div class="detail-info">
          <h2>${product.name}</h2>
          <div class="price">${product.price}</div>
          ${product.uniqueLabel ? `<div class="price" style="font-size:0.9rem;color:var(--blue-accent);margin-top:-8px;margin-bottom:14px">${product.uniqueLabel}</div>` : ''}
          <div class="detail-rating">
            <span class="big-score">${avg.toFixed(1)}</span>
            <div class="detail-rating-info">
              <div class="stars">${getStarsHTML(Math.round(avg))}</div>
              <span class="review-count">${count} ${pluralize(count, 'отзыв', 'отзыва', 'отзывов')}</span>
            </div>
          </div>
          <p class="detail-description">${product.description}</p>
          ${renderDetailPlaylist(product)}
          ${product.sold
            ? `<button class="submit-btn sold-btn" style="max-width:280px;margin:20px auto 0" disabled><i class="fas fa-lock"></i> Продано</button>`
            : (product.link ? `<a href="${product.link}" target="_blank" rel="noopener" class="submit-btn" style="max-width:280px;margin:20px auto 0;text-decoration:none"><i class="fas fa-bag-shopping"></i> Купить на ${getMarketplaceName()}</a>` : '')}
        </div>
      </div>
    </div>

    <div class="reviews-section">
      <div class="reviews-header">
        <h3>Отзывы и оценки</h3>
        <select class="sort-select" id="sortSelect" onchange="changeSort(this.value)">
          <option value="newest" ${currentSort === 'newest' ? 'selected' : ''}>Новые → Старые</option>
          <option value="oldest" ${currentSort === 'oldest' ? 'selected' : ''}>Старые → Новые</option>
          <option value="rating_desc" ${currentSort === 'rating_desc' ? 'selected' : ''}>По убыванию оценки</option>
          <option value="rating_asc" ${currentSort === 'rating_asc' ? 'selected' : ''}>По возрастанию оценки</option>
        </select>
      </div>
      <div class="reviews-list" id="reviewsList"></div>
    </div>

    <div class="review-form-container reviews-source-note">
      <h3>Отзывы с сайта ${getMarketplaceName()}</h3>
      <p>Добавление новых отзывов на этой странице отключено. Ниже отображаются сохранённые отзывы, привязанные к выбранному товару.</p>
    </div>`;

      renderReviews();
    }

    function createEmptyState() {
      const d = document.createElement('div');
      d.className = 'empty-state';
      d.innerHTML = `<i class="fas fa-hand-pointer"></i><h3>Выберите товар</h3><p>Нажмите на товар из каталога, чтобы увидеть подробности и отзывы</p>`;
      return d;
    }

    /* ============================================================
       RENDER REVIEWS
       ============================================================ */
    function renderReviews() {
      const list = document.getElementById('reviewsList');
      if (!list) return;
      let pr = getReviewsForProduct(selectedProductId);
      switch (currentSort) {
        case 'newest': pr.sort((a, b) => new Date(b.date) - new Date(a.date)); break;
        case 'oldest': pr.sort((a, b) => new Date(a.date) - new Date(b.date)); break;
        case 'rating_desc': pr.sort((a, b) => b.rating - a.rating); break;
        case 'rating_asc': pr.sort((a, b) => a.rating - b.rating); break;
      }
      if (!pr.length) {
        list.innerHTML = `<div class="no-reviews"><i class="fas fa-comment-slash"></i><p>Для этого товара пока нет отзывов.</p></div>`;
        return;
      }
      list.innerHTML = pr.map(r => {
        const u = getUserById(r.userId);
        if (!u) return '';
        const ini = getInitials(u.name);
        const del = false;
        return `
      <div class="review-card" id="review-${r.id}">
        <div class="review-top">
          <div class="review-user" onclick="openProfile('${u.id}')">
            <div class="avatar" style="background:${u.color}">${ini}</div>
            <div class="review-user-info">
              <h4>${u.name}</h4>
              <span class="review-date">${formatDate(r.date)}</span>
            </div>
          </div>
          <div class="review-actions">
            <div class="review-stars">${getStarsHTML(r.rating)}</div>
            ${del ? `<button class="delete-btn" onclick="deleteReview('${r.id}')" title="Удалить"><i class="fas fa-trash-can"></i></button>` : ''}
          </div>
        </div>
        <div class="review-text">${r.text}</div>
      </div>`;
      }).join('');
    }

    function changeSort(v) { currentSort = v; renderReviews(); }

    /* ============================================================
       STAR RATING INPUT
       ============================================================ */
    let selectedRating = 0;

    function initStarRating() {
      const c = document.getElementById('starRatingInput');
      if (!c) return;
      selectedRating = 0;
      const stars = c.querySelectorAll('i');
      stars.forEach(s => {
        s.addEventListener('mouseenter', () => {
          const v = parseInt(s.dataset.value);
          stars.forEach(x => x.classList.toggle('active', parseInt(x.dataset.value) <= v));
        });
        s.addEventListener('click', () => {
          selectedRating = parseInt(s.dataset.value);
          stars.forEach(x => x.classList.toggle('active', parseInt(x.dataset.value) <= selectedRating));
        });
      });
      c.addEventListener('mouseleave', () => {
        stars.forEach(x => x.classList.toggle('active', parseInt(x.dataset.value) <= selectedRating));
      });
    }

    /* ============================================================
       SUBMIT REVIEW
       ============================================================ */
    function submitReview(e) {
      e.preventDefault();
      const ni = document.getElementById('reviewName');
      const ti = document.getElementById('reviewText');
      const name = ni.value.trim();
      const text = ti.value.trim();
      if (!name) { showToast('Введите имя', 'error'); return; }
      if (selectedRating === 0) { showToast('Выберите оценку', 'error'); return; }
      if (!text) { showToast('Напишите отзыв', 'error'); return; }

      let user = users.find(u => u.name.toLowerCase() === name.toLowerCase());
      if (!user) {
        user = { id: generateId(), name, color: randomColor(), regDate: new Date().toISOString().split('T')[0], socials: generateRandomSocials(name) };
        users.push(user);
      }
      sessionUserNames.add(user.name);

      const review = { id: generateId(), productId: selectedProductId, userId: user.id, rating: selectedRating, text, date: new Date().toISOString().split('T')[0] };
      reviews.push(review);
      saveData();
      ni.value = ''; ti.value = ''; selectedRating = 0;
      renderDetail();
      renderProducts(document.getElementById('searchInput').value);
      setTimeout(() => { const el = document.getElementById(`review-${review.id}`); if (el) el.classList.add('new-review'); }, 50);
      showToast('Отзыв опубликован', 'success');
    }

    function generateRandomSocials(name) {
      const h = name.toLowerCase().replace(/[^a-zа-яё]/gi, '').slice(0, 10) || 'user';
      const l = transliterate(h);
      const sf = ['_dev', '_tech', '', '_pro', '_code'];
      const s = sf[Math.floor(Math.random() * sf.length)];
      return { telegram: `@${l}${s}`, github: `${l}${s}`.replace('@', ''), twitter: `@${l}${s}` };
    }

    function transliterate(s) {
      const m = { 'а': 'a', 'б': 'b', 'в': 'v', 'г': 'g', 'д': 'd', 'е': 'e', 'ё': 'yo', 'ж': 'zh', 'з': 'z', 'и': 'i', 'й': 'y', 'к': 'k', 'л': 'l', 'м': 'm', 'н': 'n', 'о': 'o', 'п': 'p', 'р': 'r', 'с': 's', 'т': 't', 'у': 'u', 'ф': 'f', 'х': 'kh', 'ц': 'ts', 'ч': 'ch', 'ш': 'sh', 'щ': 'sch', 'ъ': '', 'ы': 'y', 'ь': '', 'э': 'e', 'ю': 'yu', 'я': 'ya' };
      return s.split('').map(c => m[c] || m[c.toLowerCase()] || c).join('');
    }

    /* ============================================================
       DELETE REVIEW
       ============================================================ */
    function deleteReview(rid) {
      const el = document.getElementById(`review-${rid}`);
      if (el) {
        el.style.animation = 'reviewRemove 0.35s ease forwards';
        setTimeout(() => {
          reviews = reviews.filter(r => r.id !== rid);
          saveData(); renderDetail(); renderProducts(document.getElementById('searchInput').value);
          showToast('Отзыв удалён', 'success');
        }, 300);
      } else {
        reviews = reviews.filter(r => r.id !== rid);
        saveData(); renderDetail(); renderProducts(document.getElementById('searchInput').value);
        showToast('Отзыв удалён', 'success');
      }
    }

    /* ============================================================
       PROFILE MODAL
       ============================================================ */
    function openProfile(uid) {
      const user = getUserById(uid);
      if (!user) return;
      const ur = reviews.filter(r => r.userId === uid);
      const avg = ur.length ? (ur.reduce((s, r) => s + r.rating, 0) / ur.length).toFixed(1) : '—';
      const ini = getInitials(user.name);

      document.getElementById('profileModal').innerHTML = `
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
      <div class="avatar large" style="background:${user.color}">${ini}</div>
      <h2>${user.name}</h2>
      <div class="join-date"><i class="fas fa-calendar-check"></i> С ${formatDate(user.regDate)}</div>
    </div>
    <div class="modal-body">
      <div class="modal-stats">
        <div class="stat-card">
          <div class="stat-value">${ur.length}</div>
          <div class="stat-label">${pluralize(ur.length, 'Отзыв', 'Отзыва', 'Отзывов')}</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${avg}</div>
          <div class="stat-label">Ср. оценка</div>
        </div>
      </div>
      ${user.socials ? `
      <div class="modal-socials">
        <h4>Соцсети</h4>
        ${user.socials.telegram ? `<a href="https://t.me/${user.socials.telegram.replace('@', '')}" target="_blank" rel="noopener" class="social-link"><i class="fab fa-telegram"></i>Telegram<span class="social-username">${user.socials.telegram}</span></a>` : ''}
        ${user.socials.github ? `<a href="https://github.com/${user.socials.github}" target="_blank" rel="noopener" class="social-link"><i class="fab fa-github"></i>GitHub<span class="social-username">${user.socials.github}</span></a>` : ''}
        ${user.socials.twitter ? `<a href="https://x.com/${user.socials.twitter.replace('@', '')}" target="_blank" rel="noopener" class="social-link"><i class="fab fa-x-twitter"></i>X / Twitter<span class="social-username">${user.socials.twitter}</span></a>` : ''}
      </div>` : ''}
    </div>
    <div class="modal-footer">
      <button class="close-modal-btn" onclick="closeModal()">Закрыть</button>
    </div>`;

      document.getElementById('modalOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    /* ============================================================
       TOAST
       ============================================================ */
    function showToast(msg, type = 'success') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      const icons = { success: 'fa-circle-check', error: 'fa-circle-exclamation' };
      t.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i> ${msg}`;
      c.appendChild(t);
      setTimeout(() => { t.style.animation = 'toastOut 0.3s ease forwards'; setTimeout(() => t.remove(), 300); }, 2500);
    }

    /* ============================================================
       EVENTS
       ============================================================ */
    document.getElementById('searchInput').addEventListener('input', function () { renderProducts(this.value); });
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    document.getElementById('modalOverlay').addEventListener('click', function (e) { if (e.target === this) closeModal(); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });
    document.getElementById('logo').addEventListener('click', function (e) {
      e.preventDefault(); selectedProductId = null;
      document.getElementById('searchInput').value = '';
      renderProducts(); renderDetail();
    });

    /* ============================================================
       INIT
       ============================================================ */
    initTheme();
    loadData();
    updateMarketplaceTabs();
    renderProducts();
    renderDetail();
  </script>
</body>

</html>
